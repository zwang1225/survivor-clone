<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survivor Clone</title>
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #111;
        font-family: monospace;
      }

      #game-container {
        position: relative;
      }

      #level-up-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.75);
      }

      #level-up-overlay.hidden {
        display: none;
      }

      .level-up-card {
        background: #1a1a2e;
        border: 2px solid #4fc3f7;
        border-radius: 8px;
        padding: 24px;
        text-align: center;
        color: #ffffff;
      }

      .level-up-card h2 {
        margin: 0 0 16px;
        color: #4fc3f7;
      }

      #level-up-choices {
        display: flex;
        gap: 12px;
      }

      .level-up-choice {
        font-family: monospace;
        font-size: 14px;
        background: #16213e;
        border: 2px solid #9e9e9e;
        border-radius: 6px;
        color: #ffffff;
        padding: 12px 16px;
        cursor: pointer;
        min-width: 140px;
      }

      .level-up-choice--uncommon {
        border-color: #4fc3f7;
      }

      .level-up-choice--rare {
        border-color: #ffd54f;
      }

      .level-up-choice:hover {
        background: #2a2a4a;
      }

      .level-up-choice small {
        display: inline-block;
        margin-top: 4px;
        opacity: 0.8;
        font-size: 11px;
      }

      .rarity-label {
        display: inline-block;
        margin-bottom: 4px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        opacity: 0.9;
        color: #9e9e9e;
      }

      .level-up-choice--uncommon .rarity-label {
        color: #4fc3f7;
      }

      .level-up-choice--rare .rarity-label {
        color: #ffd54f;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="app"></div>
      <div id="level-up-overlay" class="hidden">
        <div class="level-up-card">
          <h2>Level Up!</h2>
          <div id="level-up-choices"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
